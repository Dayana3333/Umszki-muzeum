<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSZKI Múzeum - Digitális Emlékkönyv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg"></div>
    <div class="wrapper">
        <div class="scene">
            <div class="book-shadow"></div>
            <div class="book">
                <div class="cover-glow"></div>
                <div class="spread">
                    <div class="page left-page" id="leftPage">
                        <div class="paper">
                            <div class="content" id="leftContent"></div>
                        </div>
                    </div>
                    <div class="spine"></div>
                    <div class="page right-page" id="rightPage">
                        <div class="paper">
                            <div class="content" id="rightContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
